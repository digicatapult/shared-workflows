name: "[LEGACY ALIAS] Generate SBOM (generate-sbom-npm.yml)"
on:
  workflow_call:
    inputs:
      dtrack_project_name:
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      enable_check_version:
        required: false
        type: boolean
        default: false
      enable_dtrack_project:
        required: false
        type: boolean
        default: false
      package_manager:
        required: false
        type: string
        default: "npm"
        description: "Package manager for version detection. Options: npm, poetry"
      env_vars:
        required: false
        type: string
        default: "{}"
      node_version:
        required: false
        type: string
        default: 24.x
      sbom_tool:
        required: false
        type: string
        default: "@cyclonedx/cyclonedx-npm"
        description: "SBOM generation tool to use.  Options: @cyclonedx/cyclonedx-npm, @cyclonedx/cdxgen"
      sbom_format:
        required: false
        type: string
        default: "json"
        description: "SBOM output format. Options: json, xml"
      sbom_output_file:
        required: false
        type: string
        default: ""
        description: "Custom output filename.  Defaults to {repo-name}.cdx. {format}"
      npm_build_command:
        required: false
        type: string
        default: ""
        description: "Optional build command to run before generating SBOM (e.g., for compiling dependencies)"
      additional_args:
        required: false
        type: string
        default: ""
        description: "Additional arguments to pass to the SBOM generation tool"
      upload_artifact:
        required: false
        type: boolean
        default: true
        description: "Whether to upload the SBOM as a workflow artifact"
    outputs:
      sbom_file:
        description: "The name of the generated SBOM file"
        value: ${{ jobs.generate-sbom.outputs.sbom_file }}
    secrets:
      DTRACK_APIKEY:
        required: false
      DTRACK_HOSTNAME:
        required: false
      DTRACK_PARENT_GUID:
        required: false
jobs:
  generate-sbom:
    uses: ./.github/workflows/generate-sbom.yml
    with:
      dtrack_project_name: ${{ inputs.dtrack_project_name }}
      enable_check_version: ${{ inputs.enable_check_version }}
      enable_dtrack_project: ${{ inputs.enable_dtrack_project }}
      package_manager: ${{ inputs.package_manager }}
      env_vars: ${{ inputs.env_vars }}
      node_version: ${{ inputs.node_version }}
      sbom_tool: ${{ inputs.sbom_tool }}
      sbom_format: ${{ inputs.sbom_format }}
      sbom_output_file: ${{ inputs.sbom_output_file }}
      npm_build_command: ${{ inputs.npm_build_command }}
      additional_args: ${{ inputs.additional_args }}
      upload_artifact: ${{ inputs.upload_artifact }}
    secrets:
      DTRACK_APIKEY: ${{ secrets.DTRACK_APIKEY }}
      DTRACK_HOSTNAME: ${{ secrets.DTRACK_HOSTNAME }}
      DTRACK_PARENT_GUID: ${{ secrets.DTRACK_PARENT_GUID }}
