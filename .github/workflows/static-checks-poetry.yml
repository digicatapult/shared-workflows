name: Poetry Static checks
on:
  workflow_call:
    inputs:
      enable_semgrep_action:
        required: false
        type: boolean
        default: true
      enable_trufflehog_action:
        required: false
        type: boolean
        default: false
      env_vars:
        required: false
        type: string
        default: "{}"
      python_version:
        required: false
        type: string
        default: "3.14"
      working_directory:
        required: false
        type: string
        default: "."
      matrix_commands:
        required: false
        type: string
        default: '["pylint", "black", "ruff", "mypy", "bandit"]'
      pylint_targets:
        required: false
        type: string
        default: "app"
      black_targets:
        required: false
        type: string
        default: "."
      ruff_targets:
        required: false
        type: string
        default: "."
      mypy_targets:
        required: false
        type: string
        default: "app/"
      bandit_targets:
        required: false
        type: string
        default: "app"
      semgrep_extra_args:
        required: false
        type: string
        default: '--config="p/default"'
      semgrep_sarif_path:
        required: false
        type: string
        default: "semgrep.sarif"
      semgrep_upload_type:
        required: false
        type: string
        default: "sarif"
      trufflehog_extra_args:
        required: false
        type: string
        default: "--results=verified,unknown"
jobs:
  static-checks:
    name: Static Analysis Checks - ${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        command: ${{ fromJson(inputs.matrix_commands) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v6
      - name: Install poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          check-latest: true
          cache: poetry
      - name: Install packages
        run: poetry install --no-interaction --no-ansi
      - name: pylint
        if: matrix.command == 'pylint'
        run: poetry run pylint ${{ inputs.pylint_targets }}
      - name: black --check
        if: matrix.command == 'black'
        run: poetry run black --check ${{ inputs.black_targets }}
      - name: ruff
        if: matrix.command == 'ruff'
        run: poetry run ruff check ${{ inputs.ruff_targets }}
      - name: mypy
        if: matrix.command == 'mypy'
        run: poetry run mypy ${{ inputs.mypy_targets }}
      - name: bandit
        if: matrix.command == 'bandit'
        run: poetry run bandit -r ${{ inputs.bandit_targets }}

  scan-secrets:
    if: ${{ inputs.enable_trufflehog_action == true }}
    name: Secrets scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: TruffleHog PR scan
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: ${{ inputs.trufflehog_extra_args }}

  scan-vulns:
    if: |
      (inputs.enable_semgrep_action == true) &&
      (github.actor != 'dependabot[bot]')
    name: Vulnerability scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          check-latest: true
      - name: Install Semgrep
        run: pip install semgrep
      - name: Semgrep CE scan
        run: |
          semgrep ${{ inputs.semgrep_extra_args }} --sarif --sarif-output=${{ inputs.semgrep_sarif_path }}
      - name: Upload Semgrep CE's SARIF results directly to GHAS
        uses: github/codeql-action/upload-sarif@v4
        if: always() && (inputs.semgrep_upload_type == 'sarif')
        with:
          sarif_file: ${{ inputs.semgrep_sarif_path }}
          category: semgrep
      - name: Upload Semgrep CE's SARIF results as an artifact
        uses: actions/upload-artifact@v7
        if: always() && (inputs.semgrep_upload_type == 'artefact')
        with:
          name: semgrep
          path: ${{ inputs.semgrep_sarif_path }}
          retention-days: 30
