name: Generate SBOM
on:
  workflow_call:
    inputs:
      dtrack_project_name:
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      enable_check_version:
        required: false
        type: boolean
        default: false
      enable_dtrack_project:
        required: false
        type: boolean
        default: false
      package_manager:
        required: false
        type: string
        default: "npm"
        description: "Package manager for version detection. Options: npm, poetry"
      env_vars:
        required: false
        type: string
        default: "{}"
      node_version:
        required: false
        type: string
        default: 24.x
      python_version:
        required: false
        type: string
        default: "3.14"
      sbom_tool:
        required: false
        type: string
        default: "@cyclonedx/cyclonedx-npm"
        description: "SBOM generation tool to use.  Options: @cyclonedx/cyclonedx-npm, @cyclonedx/cdxgen"
      sbom_format:
        required: false
        type: string
        default: "json"
        description: "SBOM output format. Options: json, xml"
      sbom_output_file:
        required: false
        type: string
        default: ""
        description: "Custom output filename.  Defaults to {repo-name}.cdx. {format}"
      npm_build_command:
        required: false
        type: string
        default: ""
        description: "Optional build command to run before generating SBOM (e.g., for compiling dependencies)"
      additional_args:
        required: false
        type: string
        default: ""
        description: "Additional arguments to pass to the SBOM generation tool"
      install_python_deps:
        required: false
        type: boolean
        default: false
        description: "Install Python dependencies before SBOM generation"
      python_install_command:
        required: false
        type: string
        default: ""
        description: "Optional custom command to install Python dependencies"
      upload_artifact:
        required: false
        type: boolean
        default: true
        description: "Whether to upload the SBOM as a workflow artifact"
    outputs:
      sbom_file:
        description: "The name of the generated SBOM file"
        value: ${{ jobs.generate-sbom.outputs.sbom_file }}
    secrets:
      DTRACK_APIKEY:
        required: false
      DTRACK_HOSTNAME:
        required: false
      DTRACK_PARENT_GUID:
        required: false
jobs:
  generate-sbom:
    name: "Generate SBOM"
    runs-on: ubuntu-latest
    outputs:
      sbom_file: ${{ steps.set-filename.outputs.filename }}
    steps:
      - uses: actions/checkout@v6
      - name: Set environment variables from JSON
        env:
          ENV_VARS_JSON: "${{ inputs.env_vars }}"
        run: |
          echo "Parsing JSON environment variables..."
          echo "$ENV_VARS_JSON" | jq -r 'to_entries|map("\(.key)=\(.value|tostring)")|.[]' >> $GITHUB_ENV
      - id: get-version
        if: inputs.enable_check_version
        uses: digicatapult/check-version@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_same_version: false
          package_manager: ${{ inputs.package_manager }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
      - uses: actions/setup-python@v6
        if: inputs.install_python_deps
        with:
          python-version: ${{ inputs.python_version }}
      - name: Cache Node.js modules
        if: |
          (inputs.sbom_tool == '@cyclonedx/cyclonedx-npm' || inputs.npm_build_command != '') &&
          (hashFiles('**/package-lock.json') != '')
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node-
            ${{ runner.OS }}-
      - name: Install Packages
        if: |
          (inputs.sbom_tool == '@cyclonedx/cyclonedx-npm' || inputs.npm_build_command != '') &&
          (hashFiles('**/package-lock.json') != '')
        run: npm ci
      - name: Install Python dependencies (custom)
        if: inputs.install_python_deps && inputs.python_install_command != ''
        run: ${{ inputs.python_install_command }}
      - name: Install Python dependencies (auto-detect)
        if: inputs.install_python_deps && inputs.python_install_command == ''
        run: |
          if [ -f pyproject.toml ] && [ "${{ inputs.package_manager }}" = "poetry" ]; then
            python -m pip install --upgrade pip
            python -m pip install poetry
            poetry install --no-interaction --no-ansi
          elif [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          else
            echo "install_python_deps is true but no install method was detected."
            echo "Provide python_install_command, or include pyproject.toml (with package_manager=poetry), or requirements.txt."
            exit 1
          fi
      - name: Build
        run: ${{ inputs.npm_build_command }}
        if: inputs.npm_build_command != ''
      - name: Set output filename
        id: set-filename
        run: |
          if [ -n "${{ inputs.sbom_output_file }}" ]; then
            echo "filename=${{ inputs.sbom_output_file }}" >> $GITHUB_OUTPUT
          else
            echo "filename=${{ github.event.repository.name }}.cdx.${{ inputs.sbom_format }}" >> $GITHUB_OUTPUT
          fi
      - name: Generate SBOM with CycloneDX NPM
        if: inputs.sbom_tool == '@cyclonedx/cyclonedx-npm'
        run: |
          ARGS="--output-file ${{ steps.set-filename.outputs.filename }}"
          if [ "${{ inputs.sbom_format }}" = "xml" ]; then
            ARGS="$ARGS --output-format XML"
          fi
          if [ -n "${{ inputs.additional_args }}" ]; then
            ARGS="$ARGS ${{ inputs.additional_args }}"
          fi
          npx @cyclonedx/cyclonedx-npm $ARGS
      - name: Generate SBOM with cdxgen
        if: inputs.sbom_tool == '@cyclonedx/cdxgen'
        run: |
          ARGS="-o ${{ steps.set-filename.outputs.filename }}"
          if [ "${{ inputs.sbom_format }}" = "xml" ]; then
            ARGS="$ARGS --format xml"
          fi
          if [ -n "${{ inputs.additional_args }}" ]; then
            ARGS="$ARGS ${{ inputs.additional_args }}"
          fi
          npx @cyclonedx/cdxgen $ARGS
      - name: Upload SBOM artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.set-filename.outputs.filename }}
          path: ${{ steps.set-filename.outputs.filename }}
          retention-days: 90
      - name: Check Dependency-Track project status
        id: check_dtrack_project_status
        shell: bash
        run: |
          if [ \"$DTRACK_PARENT_GUID\" == \"\" ]; then
            echo \"dtrack_parent_guid_set=NO\" >> $GITHUB_OUTPUT
          else
            echo \"dtrack_parent_guid_set=YES\" >> $GITHUB_OUTPUT
          fi
        env:
          DTRACK_PARENT_GUID: ${{ secrets.DTRACK_PARENT_GUID }}
      - name: Upload SBOM to Dependency-Track
        uses: DependencyTrack/gh-upload-sbom@v3
        if: |
          success() &&
          inputs.enable_check_version &&
          inputs.enable_dtrack_project &&
          steps.check_dtrack_project_status.dtrack_parent_guid_set == 'YES'
        with:
          serverhostname: ${{ secrets.DTRACK_HOSTNAME }}
          apikey: ${{ secrets.DTRACK_APIKEY }}
          projectname: ${{ inputs.dtrack_project_name }}
          projectversion: ${{ steps.get-version.outputs.version }}
          projecttags: ${{ steps.get-version.outputs.version }}
          bomfilename: ${{ steps.set-filename.outputs.filename }}
          autocreate: true
          parent: ${{ secrets.DTRACK_PARENT_GUID }}
